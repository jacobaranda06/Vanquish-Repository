<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanquish — Hall of Dominion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #7a5e1a;
    --blood: #8b1a1a;
    --blood-light: #c0392b;
    --obsidian: #0a0a0f;
    --stone: #1a1a24;
    --stone-mid: #22222e;
    --stone-light: #2e2e3e;
    --parchment: #f0e6c8;
    --parchment-dark: #c8b48a;
    --text-dim: #8a7a5a;
    --white: #fff;
    --shadow: rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--obsidian);
    color: var(--parchment);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === BACKGROUND === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,26,26,0.18) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(201,168,76,0.07) 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.02) 60px,
        rgba(201,168,76,0.02) 61px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.02) 60px,
        rgba(201,168,76,0.02) 61px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* === HEADER === */
  header {
    position: relative;
    text-align: center;
    padding: 56px 24px 36px;
    border-bottom: 1px solid rgba(201,168,76,0.25);
    z-index: 1;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 320px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .crown-icon {
    font-size: 2.4rem;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
    animation: pulse-gold 3s ease-in-out infinite;
  }

  @keyframes pulse-gold {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
    50% { filter: drop-shadow(0 0 22px rgba(201,168,76,0.9)); }
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.1;
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* === NAV TABS === */
  .nav {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    position: relative;
    z-index: 1;
  }
  .nav-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px 28px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .nav-btn:hover { color: var(--gold-light); }
  .nav-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* === MAIN LAYOUT === */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* === SECTION HEADERS === */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  }

  /* === LEADERBOARD === */
  .leaderboard {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rank-card {
    display: grid;
    grid-template-columns: 52px 1fr auto auto;
    align-items: center;
    gap: 16px;
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.12);
    border-left: 3px solid transparent;
    padding: 16px 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .rank-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(201,168,76,0.04), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .rank-card:hover::before { opacity: 1; }
  .rank-card:hover { border-color: rgba(201,168,76,0.3); border-left-color: var(--gold); }

  .rank-card.rank-1 { border-left-color: var(--gold); background: linear-gradient(90deg, rgba(201,168,76,0.08), var(--stone)); }
  .rank-card.rank-2 { border-left-color: #a0a0b8; background: linear-gradient(90deg, rgba(160,160,184,0.06), var(--stone)); }
  .rank-card.rank-3 { border-left-color: #8b4513; background: linear-gradient(90deg, rgba(139,69,19,0.08), var(--stone)); }

  .rank-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); text-shadow: 0 0 12px rgba(201,168,76,0.6); }
  .rank-2 .rank-num { color: #c0c0d8; }
  .rank-3 .rank-num { color: #cd853f; }
  .rank-num.other { color: var(--text-dim); font-family: 'EB Garamond', serif; font-size: 1rem; }

  .player-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--parchment);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-faction {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .record {
    text-align: right;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    white-space: nowrap;
  }
  .record-wl { color: var(--parchment-dark); }
  .record-pct { color: var(--gold); font-size: 0.72rem; }

  .win-count {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    min-width: 42px;
    text-align: right;
  }

  /* === LOG MATCH FORM === */
  .form-card {
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.18);
    padding: 32px;
    position: relative;
  }
  .form-card::before {
    content: '⚔';
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    background: var(--stone);
    padding: 0 16px;
    color: var(--gold);
    font-size: 1.2rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 580px) { .form-row { grid-template-columns: 1fr; } }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input, select, textarea {
    background: var(--obsidian);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--parchment);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(201,168,76,0.1);
  }
  select option { background: var(--stone); }

  .vs-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--blood-light);
    padding-top: 28px;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--obsidian);
    font-weight: 700;
    width: 100%;
    margin-top: 8px;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 8px 18px;
    font-size: 0.7rem;
  }
  .btn-secondary:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .btn-danger {
    background: transparent;
    border: 1px solid rgba(139,26,26,0.5);
    color: var(--blood-light);
    padding: 8px 18px;
    font-size: 0.7rem;
  }
  .btn-danger:hover { border-color: var(--blood-light); background: rgba(139,26,26,0.1); }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--stone-light);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 28px;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* === PROFILES === */
  .profiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .profile-card {
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.12);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .profile-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .profile-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--stone-light), var(--stone-mid));
    border: 2px solid rgba(201,168,76,0.3);
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    line-height: 1;
  }
  .profile-name-display {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--parchment);
    margin-bottom: 4px;
  }
  .profile-stats {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .profile-wins-big {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.6rem;
    color: var(--gold);
    margin: 8px 0 2px;
  }

  /* === PROFILE MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  .modal {
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.3);
    max-width: 580px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  }
  .modal-header {
    padding: 28px 28px 0;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding-bottom: 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-body { padding: 24px 28px 28px; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .modal-close:hover { color: var(--gold); }

  .match-history { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .match-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--stone-mid);
    border-left: 3px solid transparent;
    font-size: 0.85rem;
  }
  .match-item.win { border-left-color: var(--gold); }
  .match-item.loss { border-left-color: var(--blood); }
  .match-result {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    font-weight: 700;
    min-width: 32px;
  }
  .match-item.win .match-result { color: var(--gold); }
  .match-item.loss .match-result { color: var(--blood-light); }
  .match-opponent { color: var(--parchment-dark); flex: 1; }
  .match-date { color: var(--text-dim); font-size: 0.75rem; font-style: italic; }
  .match-deck { color: var(--text-dim); font-size: 0.72rem; font-style: italic; }

  /* Stats bar */
  .stat-bar-wrap { margin: 16px 0; }
  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    font-size: 0.68rem;
    text-transform: uppercase;
  }
  .stat-bar-track {
    height: 6px;
    background: var(--stone-mid);
    border-radius: 0;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    transition: width 0.6s ease;
  }

  /* === ADD PLAYER === */
  .add-player-form {
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.18);
    padding: 28px;
    margin-bottom: 32px;
  }

  /* === EMPTY STATE === */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-style: italic; }

  /* === RECENT MATCHES === */
  .recent-list { display: flex; flex-direction: column; gap: 8px; }
  .recent-item {
    display: grid;
    grid-template-columns: 1fr 40px 1fr auto;
    align-items: center;
    gap: 8px;
    background: var(--stone);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 12px 16px;
    font-size: 0.88rem;
  }
  .recent-winner { color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.82rem; }
  .recent-loser { color: var(--text-dim); }
  .recent-vs { color: var(--blood-light); text-align: center; font-family: 'Cinzel', serif; font-size: 0.72rem; }
  .recent-date { color: var(--text-dim); font-size: 0.72rem; font-style: italic; text-align: right; white-space: nowrap; }

  /* ornamental divider */
  .ornament {
    text-align: center;
    color: var(--gold-dark);
    font-size: 1rem;
    margin: 8px 0;
    letter-spacing: 0.5em;
    opacity: 0.6;
  }

  /* delete btn on match */
  .match-delete {
    background: none;
    border: none;
    color: rgba(139,26,26,0.5);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 2px 4px;
    transition: color 0.2s;
    margin-left: 4px;
  }
  .match-delete:hover { color: var(--blood-light); }

  /* convergence composition tag */
  .comp-tag {
    display: inline-block;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    margin-top: 4px;
  }

  scrollbar-width: thin;
  scrollbar-color: var(--gold-dark) var(--stone);
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--stone); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); }
</style>
</head>
<body>

<header>
  <span class="crown-icon">♛</span>
  <h1>Hall of Dominion</h1>
  <p class="subtitle">Vanquish — Official Playtester Records</p>
</header>

<nav class="nav">
  <button class="nav-btn active" onclick="showView('leaderboard')">⚔ Leaderboard</button>
  <button class="nav-btn" onclick="showView('log')">📜 Log Match</button>
  <button class="nav-btn" onclick="showView('players')">⚜ Players</button>
  <button class="nav-btn" onclick="showView('recent')">🗓 Recent</button>
</nav>

<main>

  <!-- LEADERBOARD VIEW -->
  <div class="view active" id="view-leaderboard">
    <div class="section-title">Rankings</div>
    <div class="leaderboard" id="leaderboard-list"></div>
  </div>

  <!-- LOG MATCH VIEW -->
  <div class="view" id="view-log">
    <div class="section-title">Record a Battle</div>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label>Winner</label>
          <select id="log-winner"></select>
        </div>
        <div class="vs-divider">VS</div>
        <div class="form-group">
          <label>Loser</label>
          <select id="log-loser"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Winner's Faction / Deck</label>
          <input type="text" id="log-winner-deck" placeholder="e.g. Brotherhood — Play for Dominion">
        </div>
        <div class="form-group">
          <label>Loser's Faction / Deck</label>
          <input type="text" id="log-loser-deck" placeholder="e.g. Myrkeval — Blitz Doctrine">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Notes (optional)</label>
        <textarea id="log-notes" rows="2" placeholder="Key moments, combos observed, balance notes..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="logMatch()">⚔ Record Victory</button>
    </div>
  </div>

  <!-- PLAYERS VIEW -->
  <div class="view" id="view-players">
    <div class="section-title">Playtester Registry</div>
    <div class="add-player-form">
      <div class="form-row">
        <div class="form-group">
          <label>Player Name</label>
          <input type="text" id="new-player-name" placeholder="Enter name..." maxlength="30">
        </div>
        <div class="form-group">
          <label>Avatar Emoji</label>
          <input type="text" id="new-player-emoji" placeholder="⚔" maxlength="2">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Favorite Faction</label>
        <input type="text" id="new-player-faction" placeholder="e.g. Brotherhood of the Axe">
      </div>
      <button class="btn btn-primary" onclick="addPlayer()">+ Enlist Playtester</button>
    </div>
    <div class="profiles-grid" id="profiles-grid"></div>
  </div>

  <!-- RECENT MATCHES VIEW -->
  <div class="view" id="view-recent">
    <div class="section-title">Battle Chronicle</div>
    <div class="recent-list" id="recent-list"></div>
  </div>

</main>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div style="font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold)" id="modal-name"></div>
        <div style="font-size:0.82rem;color:var(--text-dim);margin-top:4px;font-style:italic" id="modal-faction"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;margin-bottom:20px">
        <div style="background:var(--stone-mid);padding:16px 8px">
          <div style="font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--gold)" id="modal-wins"></div>
          <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);font-family:'Cinzel',serif;margin-top:4px">Wins</div>
        </div>
        <div style="background:var(--stone-mid);padding:16px 8px">
          <div style="font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--blood-light)" id="modal-losses"></div>
          <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);font-family:'Cinzel',serif;margin-top:4px">Losses</div>
        </div>
        <div style="background:var(--stone-mid);padding:16px 8px">
          <div style="font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--parchment-dark)" id="modal-pct"></div>
          <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);font-family:'Cinzel',serif;margin-top:4px">Win %</div>
        </div>
      </div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-label"><span>Win Rate</span><span id="modal-pct-label"></span></div>
        <div class="stat-bar-track"><div class="stat-bar-fill" id="modal-bar" style="width:0%"></div></div>
      </div>
      <div class="section-title" style="margin-top:20px">Match History</div>
      <div class="match-history" id="modal-history"></div>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-danger" onclick="deletePlayer(currentProfileId)">Remove Player</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = load();
let currentProfileId = null;

function load() {
  try {
    const s = localStorage.getItem('vanquish_hall');
    return s ? JSON.parse(s) : { players: [], matches: [] };
  } catch(e) { return { players: [], matches: [] }; }
}

function save() {
  localStorage.setItem('vanquish_hall', JSON.stringify(state));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ===== VIEWS =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  render();
}

// ===== RENDER ALL =====
function render() {
  renderLeaderboard();
  renderProfiles();
  renderRecent();
  populateSelects();
}

// ===== LEADERBOARD =====
function getStats(playerId) {
  const wins = state.matches.filter(m => m.winnerId === playerId).length;
  const losses = state.matches.filter(m => m.loserId === playerId).length;
  const total = wins + losses;
  const pct = total > 0 ? Math.round((wins / total) * 100) : 0;
  return { wins, losses, total, pct };
}

function renderLeaderboard() {
  const el = document.getElementById('leaderboard-list');
  if (!state.players.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">♛</div><p>No players enlisted yet. Add players to begin.</p></div>';
    return;
  }
  const sorted = [...state.players].map(p => ({ ...p, ...getStats(p.id) }))
    .sort((a, b) => b.wins - a.wins || b.pct - a.pct);

  el.innerHTML = sorted.map((p, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const rankDisplay = i === 0 ? '♛' : i === 1 ? '♜' : i === 2 ? '♞' : `${i+1}`;
    const numClass = i > 2 ? 'other' : '';
    return `
      <div class="rank-card ${rankClass}" onclick="openProfile('${p.id}')">
        <div class="rank-num ${numClass}">${rankDisplay}</div>
        <div class="player-info">
          <div class="player-name">${esc(p.emoji||'⚔')} ${esc(p.name)}</div>
          <div class="player-faction">${esc(p.faction||'Unknown Faction')}</div>
        </div>
        <div class="record">
          <div class="record-wl">${p.wins}W – ${p.losses}L</div>
          <div class="record-pct">${p.pct}%</div>
        </div>
        <div class="win-count">${p.wins}</div>
      </div>`;
  }).join('');
}

// ===== PROFILES =====
function renderProfiles() {
  const el = document.getElementById('profiles-grid');
  if (!state.players.length) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚜</div><p>No players enlisted yet.</p></div>';
    return;
  }
  el.innerHTML = state.players.map(p => {
    const s = getStats(p.id);
    return `
      <div class="profile-card" onclick="openProfile('${p.id}')">
        <div class="profile-avatar">${esc(p.emoji||'⚔')}</div>
        <div class="profile-name-display">${esc(p.name)}</div>
        <div class="profile-wins-big">${s.wins}</div>
        <div class="profile-stats">${s.wins}W / ${s.losses}L · ${s.pct}%</div>
        <div><span class="comp-tag">${esc(p.faction||'No Faction')}</span></div>
      </div>`;
  }).join('');
}

// ===== RECENT MATCHES =====
function renderRecent() {
  const el = document.getElementById('recent-list');
  if (!state.matches.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📜</div><p>No battles recorded yet.</p></div>';
    return;
  }
  const recent = [...state.matches].reverse().slice(0, 30);
  el.innerHTML = recent.map(m => {
    const winner = state.players.find(p => p.id === m.winnerId);
    const loser = state.players.find(p => p.id === m.loserId);
    const wName = winner ? winner.name : 'Unknown';
    const lName = loser ? loser.name : 'Unknown';
    const date = new Date(m.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    return `
      <div class="recent-item">
        <div>
          <div class="recent-winner">${esc(wName)}</div>
          ${m.winnerDeck ? `<div style="font-size:0.72rem;color:var(--text-dim);font-style:italic">${esc(m.winnerDeck)}</div>` : ''}
        </div>
        <div class="recent-vs">vs</div>
        <div>
          <div class="recent-loser">${esc(lName)}</div>
          ${m.loserDeck ? `<div style="font-size:0.72rem;color:var(--text-dim);font-style:italic">${esc(m.loserDeck)}</div>` : ''}
        </div>
        <div class="recent-date">${date}</div>
      </div>
      ${m.notes ? `<div style="background:var(--stone-mid);padding:8px 16px;font-size:0.8rem;color:var(--text-dim);font-style:italic;border-top:1px solid rgba(201,168,76,0.08)">"${esc(m.notes)}"</div>` : ''}`;
  }).join('');
}

// ===== SELECTS =====
function populateSelects() {
  ['log-winner','log-loser'].forEach(id => {
    const sel = document.getElementById(id);
    const val = sel.value;
    sel.innerHTML = '<option value="">— Select Player —</option>' +
      state.players.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
    sel.value = val;
  });
}

// ===== ADD PLAYER =====
function addPlayer() {
  const name = document.getElementById('new-player-name').value.trim();
  const emoji = document.getElementById('new-player-emoji').value.trim() || '⚔';
  const faction = document.getElementById('new-player-faction').value.trim();
  if (!name) { toast('Enter a player name'); return; }
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    toast('Player already exists'); return;
  }
  state.players.push({ id: uid(), name, emoji, faction });
  save();
  document.getElementById('new-player-name').value = '';
  document.getElementById('new-player-emoji').value = '';
  document.getElementById('new-player-faction').value = '';
  render();
  toast('⚜ ' + name + ' enlisted!');
}

// ===== LOG MATCH =====
function logMatch() {
  const wId = document.getElementById('log-winner').value;
  const lId = document.getElementById('log-loser').value;
  const wDeck = document.getElementById('log-winner-deck').value.trim();
  const lDeck = document.getElementById('log-loser-deck').value.trim();
  const notes = document.getElementById('log-notes').value.trim();
  if (!wId || !lId) { toast('Select both players'); return; }
  if (wId === lId) { toast('Cannot play against yourself'); return; }
  state.matches.push({ id: uid(), winnerId: wId, loserId: lId, winnerDeck: wDeck, loserDeck: lDeck, notes, date: Date.now() });
  save();
  document.getElementById('log-winner-deck').value = '';
  document.getElementById('log-loser-deck').value = '';
  document.getElementById('log-notes').value = '';
  render();
  const winner = state.players.find(p => p.id === wId);
  toast('⚔ Victory recorded for ' + (winner ? winner.name : 'Unknown'));
}

// ===== PROFILE MODAL =====
function openProfile(id) {
  currentProfileId = id;
  const p = state.players.find(pl => pl.id === id);
  if (!p) return;
  const s = getStats(id);
  document.getElementById('modal-name').textContent = (p.emoji||'⚔') + ' ' + p.name;
  document.getElementById('modal-faction').textContent = p.faction || 'No faction listed';
  document.getElementById('modal-wins').textContent = s.wins;
  document.getElementById('modal-losses').textContent = s.losses;
  document.getElementById('modal-pct').textContent = s.pct + '%';
  document.getElementById('modal-pct-label').textContent = s.pct + '%';
  document.getElementById('modal-bar').style.width = s.pct + '%';

  const playerMatches = state.matches.filter(m => m.winnerId === id || m.loserId === id)
    .sort((a,b) => b.date - a.date);

  const histEl = document.getElementById('modal-history');
  if (!playerMatches.length) {
    histEl.innerHTML = '<div style="color:var(--text-dim);font-style:italic;text-align:center;padding:20px">No matches recorded</div>';
  } else {
    histEl.innerHTML = playerMatches.map(m => {
      const isWin = m.winnerId === id;
      const oppId = isWin ? m.loserId : m.winnerId;
      const opp = state.players.find(pl => pl.id === oppId);
      const oppName = opp ? opp.name : 'Unknown';
      const deck = isWin ? m.winnerDeck : m.loserDeck;
      const date = new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return `
        <div class="match-item ${isWin?'win':'loss'}">
          <div class="match-result">${isWin?'WIN':'LOSS'}</div>
          <div class="match-opponent">vs ${esc(oppName)}</div>
          ${deck ? `<div class="match-deck">${esc(deck)}</div>` : ''}
          <div class="match-date">${date}</div>
          <button class="match-delete" onclick="deleteMatch('${m.id}','${id}')" title="Delete match">✕</button>
        </div>
        ${m.notes ? `<div style="background:var(--obsidian);padding:6px 14px 6px 50px;font-size:0.78rem;color:var(--text-dim);font-style:italic">${esc(m.notes)}</div>` : ''}`;
    }).join('');
  }

  document.getElementById('profile-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('profile-modal').classList.remove('open');
  currentProfileId = null;
}

function deleteMatch(matchId, profileId) {
  if (!confirm('Delete this match record?')) return;
  state.matches = state.matches.filter(m => m.id !== matchId);
  save();
  render();
  openProfile(profileId);
}

function deletePlayer(id) {
  const p = state.players.find(pl => pl.id === id);
  if (!p) return;
  if (!confirm(`Remove ${p.name} and all their match records?`)) return;
  state.players = state.players.filter(pl => pl.id !== id);
  state.matches = state.matches.filter(m => m.winnerId !== id && m.loserId !== id);
  save();
  render();
  closeModal();
  toast('Player removed');
}

// ===== UTILS =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// close modal on overlay click
document.getElementById('profile-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== INIT =====
render();
</script>
</body>
</html>
